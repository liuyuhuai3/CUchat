# docker-compose.yml
version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: cuchat-mysql
    restart: always

    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./server/database/seeds.sql:/docker-entrypoint-initdb.d/2-seeds.sql
    ports:
      - "3306:3306"
    networks:
      - cuchat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyour_secure_mysql_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cuchat-backend
    restart: always
    env_file:
      - ./server/.env.production
    volumes:
      - ./server/uploads:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cuchat-network

  # 前端 + Nginx
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cuchat-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cuchat-network

networks:
  cuchat-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local